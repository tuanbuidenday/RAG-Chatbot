version: "3.9"

services:
  api:
    build: .
    container_name: rag_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - .:/workspace
    restart: unless-stopped

  streamlit:
    build: .
    container_name: rag_streamlit
    command: streamlit run app/app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - .:/workspace
    depends_on:
      - api
    restart: unless-stopped
